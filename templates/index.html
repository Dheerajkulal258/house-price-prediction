<!DOCTYPE html>
<html>
<head>

    <title>House Price Prediction</title>

    <style>

        body{
            font-family: Arial;
            background: #f2f2f2;
            text-align: center;
            padding-top: 50px;
        }

        .container{
            background: white;
            width: 400px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input{
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button{
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>House Price Prediction</h2>

    <form action="/predict" method="POST">

        <input type="number" name="squarefeet" placeholder="Square Feet" required>

        <input type="number" name="bedrooms" placeholder="Bedrooms" required>

        <input type="number" name="bathrooms" placeholder="Bathrooms" required>

        <button type="submit">Predict Price</button>

    </form>

    <h3>{{ prediction_text }}</h3>

</div>

</body>
</html>
